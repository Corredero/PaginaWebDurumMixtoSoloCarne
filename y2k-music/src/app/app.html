<div class="page" [class.unauthenticated]="!authService.isAuthenticated()">
  <app-header />

  <div class="layout">
    <app-sidebar (viewChange)="onViewChange($event)" />

    <div class="main-col">
      <app-song-form *ngIf="currentView() === 'songs'" />
      <app-song-list *ngIf="currentView() === 'songs'" />
      <app-top-artists *ngIf="currentView() === 'top10'" />
      <app-artist-search *ngIf="currentView() === 'artist'" />
      <app-chat *ngIf="currentView() === 'chat'" />
      <app-novedades *ngIf="currentView() === 'novedades'" />
      <app-juego *ngIf="currentView() === 'juego'" />
    </div>
  </div>

  <div class="overlay" *ngIf="showSubscriptionPopup()">
    <div class="popup-card">
      <button class="popup-close" type="button" (click)="closeSubscriptionPopup()">×</button>
      <h2>Inscribete si quieres recibir anuncios y novedades.</h2>
      <p class="popup-copy">Recibe novedades sobre álbumes, lanzamientos y noticias retro directamente en tu correo.</p>

      <form (ngSubmit)="submitSubscription()" class="popup-form" novalidate>
        <label>
          Nombre
          <input type="text" [(ngModel)]="subscriptionName" name="subscriptionName" placeholder="Nombre" />
          <span class="error" *ngIf="subscriptionErrors().nombre">{{ subscriptionErrors().nombre }}</span>
        </label>

        <label>
          Apellidos
          <input type="text" [(ngModel)]="subscriptionLastName" name="subscriptionLastName" placeholder="Apellidos" />
          <span class="error" *ngIf="subscriptionErrors().apellidos">{{ subscriptionErrors().apellidos }}</span>
        </label>

        <label>
          Correo electrónico
          <input type="email" [(ngModel)]="subscriptionEmail" name="subscriptionEmail" placeholder="correo@ejemplo.com" />
          <span class="error" *ngIf="subscriptionErrors().email">{{ subscriptionErrors().email }}</span>
        </label>

        <button class="popup-submit" type="submit">Enviar</button>
      </form>

      <div class="popup-message" *ngIf="subscriptionMessage()">{{ subscriptionMessage() }}</div>
    </div>
  </div>

  <app-footer />
</div>
